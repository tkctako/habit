<!DOCTYPE html><html lang="zh-Hant"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><title>情侶習慣追蹤</title><link rel="dns-prefetch" href="https://kmcnhuqrxxwzhnesisar.supabase.co"><link rel="preconnect" href="https://kmcnhuqrxxwzhnesisar.supabase.co"><script src="/supabase.min.js"></script><script src="/sb.js"></script><link rel="stylesheet" href="/_astro/Layout.c1_6T_iV.css"></head> <body class="bg-bg"> <div id="auth-guard" style="position:fixed;inset:0;background:var(--color-bg,#f5efe6);z-index:9999;display:flex;align-items:center;justify-content:center"> <span style="color:var(--color-gray-text,#9e8e7e);font-size:14px">載入中...</span> </div> <div class="app-container">  <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12"> <div class="w-20 h-20 rounded-full flex items-center justify-center mb-6" style="background:linear-gradient(135deg,var(--color-me),var(--color-accent))"> <span class="text-4xl">♡</span> </div> <h1 class="text-2xl font-bold text-dark mb-1">情侶習慣追蹤</h1> <p class="text-gray-text text-sm mb-8">一起養成好習慣</p> <!-- Login Form --> <form id="login-form" class="w-full space-y-4 mb-6"> <div> <label class="block text-sm font-semibold mb-1.5">Email</label> <input type="email" id="l-email" class="form-input" placeholder="email@example.com"> </div> <div> <label class="block text-sm font-semibold mb-1.5">密碼</label> <input type="password" id="l-pass" class="form-input" placeholder="至少 6 個字元"> </div> <div id="l-error" class="text-sm text-center" style="color:var(--color-red);display:none"></div> <button type="submit" class="btn-gradient mt-4" id="l-btn">登入</button> </form> <p class="text-gray-text text-sm">與你的另一半一起成長 💕</p> </div> <script>
    // Check if already logged in
    (async()=>{
      const s=await SB.getSession();
      if(s){
        const ok=await SB.init();
        if(ok&&SB.myProfile)window.location.href='/habits';
      }
    })();

    // Login
    document.getElementById('login-form').addEventListener('submit',async function(e){
      e.preventDefault();
      const btn=document.getElementById('l-btn');
      const err=document.getElementById('l-error');
      err.style.display='none';
      btn.textContent='登入中...';btn.disabled=true;
      const email=document.getElementById('l-email').value.trim();
      const password=document.getElementById('l-pass').value;
      const{error}=await SB.client.auth.signInWithPassword({email,password});
      if(error){err.textContent=error.message;err.style.display='';btn.textContent='登入';btn.disabled=false;return;}
      // Auto-create profile only if user has no profile yet
      const{data:{user}}=await SB.client.auth.getUser();
      if(user){
        const{data:profile}=await SB.client.from('users').select('id').eq('id',user.id).maybeSingle();
        if(!profile){
          const name=email.split('@')[0];
          await SB.client.rpc('setup_profile',{p_name:name,p_invite_code:null});
        }
      }
      window.location.href='/habits';
    });
  </script>  </div> <script>
    // Auto-hide guard on login page
    if(window.location.pathname==='/') document.getElementById('auth-guard').style.display='none';
  </script> </body> </html>
